name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.laravel-version == '13.*' }}

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']
        laravel-version: ['9.*', '10.*', '11.*', '12.*', '13.*']
        exclude:
          # L11+ requires PHP 8.2+
          - php-version: '8.1'
            laravel-version: '11.*'
          - php-version: '8.1'
            laravel-version: '12.*'
          - php-version: '8.1'
            laravel-version: '13.*'
          # L13 targets PHP 8.3+
          - php-version: '8.2'
            laravel-version: '13.*'
          # Skip old Laravel on newest PHP to keep the matrix manageable
          - php-version: '8.4'
            laravel-version: '9.*'
          - php-version: '8.4'
            laravel-version: '10.*'

    name: P${{ matrix.php-version }} - L${{ matrix.laravel-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: xdebug

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel-version }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.clover

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.clover
