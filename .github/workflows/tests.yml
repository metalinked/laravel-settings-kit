name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental == true }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # PHP 8.1 — L9, L10
          - { php-version: '8.1', laravel-version: '9.*',  testbench-version: '^7.0' }
          - { php-version: '8.1', laravel-version: '10.*', testbench-version: '^8.0' }
          # PHP 8.2 — L9, L10, L11, L12
          - { php-version: '8.2', laravel-version: '9.*',  testbench-version: '^7.0' }
          - { php-version: '8.2', laravel-version: '10.*', testbench-version: '^8.0' }
          - { php-version: '8.2', laravel-version: '11.*', testbench-version: '^9.0' }
          - { php-version: '8.2', laravel-version: '12.*', testbench-version: '^10.0' }
          # PHP 8.3 — L10, L11, L12, L13 (experimental)
          - { php-version: '8.3', laravel-version: '10.*', testbench-version: '^8.0' }
          - { php-version: '8.3', laravel-version: '11.*', testbench-version: '^9.0' }
          - { php-version: '8.3', laravel-version: '12.*', testbench-version: '^10.0' }
          - { php-version: '8.3', laravel-version: '13.*', testbench-version: '^11.0', experimental: true }
          # PHP 8.4 — L11, L12, L13 (experimental)
          - { php-version: '8.4', laravel-version: '11.*', testbench-version: '^9.0' }
          - { php-version: '8.4', laravel-version: '12.*', testbench-version: '^10.0' }
          - { php-version: '8.4', laravel-version: '13.*', testbench-version: '^11.0', experimental: true }

    name: P${{ matrix.php-version }} - L${{ matrix.laravel-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: xdebug

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Disable advisory blocking
        run: composer config --no-interaction policy.advisories.block false

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel-version }}" "orchestra/testbench:${{ matrix.testbench-version }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: List installed dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.clover

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.clover
